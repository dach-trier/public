name: Public Docker images

on:
  release:
    types: [published]

jobs:
  build_and_push_images:
    name: Build and push Docker images to GHCR
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    strategy:
      matrix:
        image:
        - name: server
          dockerfile: build/server/Dockerfile

    steps:
    - name: Check out repository
      uses: actions/checkout@v6

    - name: Log in to Github Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set Docker image tag
      id: vars
      run: echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV

    - name: Build Docker image
      run: |
        docker buildx build \
          --platform linux/arm64 \
          -f ${{ matrix.image.dockerfile }} \
          -t ghcr.io/${{ github.repository_owner }}/public-${{ matrix.image.name }}:${{ env.IMAGE_TAG }} \
          .

    - name: Push Docker image
      run: |
        docker push ghcr.io/${{ github.repository_owner }}/public-${{ matrix.image.name}}:${{ env.IMAGE_TAG }}
